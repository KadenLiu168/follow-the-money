name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: 'npm'
      - run: npm ci
      - name: Run tests
        run: npm test
      - name: Lint
        run: npm run lint
      - name: Format check
        run: npm run format:check
