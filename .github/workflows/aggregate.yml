name: Aggregate SEC Filings

on:
  schedule:
    - cron: '0 12 * * *' # 08:00 ET (winter) — UTC offset may shift; cron uses UTC
    - cron: '0 0 * * *' # 20:00 ET
  workflow_dispatch:

permissions:
  contents: write

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: 'npm'
      - run: npm ci
      - name: Run tests (gate)
        run: npm test
      - name: Lint (gate)
        run: npm run lint
      - name: Format check (gate)
        run: npm run format:check
      - name: Run aggregator
        env:
          SEC_EDGAR_USER_AGENT: ${{ secrets.SEC_EDGAR_USER_AGENT }}
        run: node scripts/aggregate.js
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Aggregator only writes files when there are new filings; gate each path on existence.
          [ -f feed-13f.json ]     && git add -f feed-13f.json
          [ -d feed-13dg ]         && git add -f feed-13dg/
          [ -f state-13f.json ]    && git add -f state-13f.json
          [ -f state-13dg.ndjson ] && git add -f state-13dg.ndjson
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "chore: update feed ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
            git push
          fi
